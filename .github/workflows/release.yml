name: Release Windows App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r desktop/requirements.txt pytest pyinstaller

      - name: Run tests
        shell: pwsh
        run: |
          $env:PYTHONPATH = Join-Path $PWD "desktop\src"
          python -m pytest tests

      - name: Build release bundle
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tools/build_release.ps1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PressureControlConsole-windows
          path: dist/PressureControlConsole-windows.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PressureControlConsole-windows.zip
